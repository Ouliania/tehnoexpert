<!-- Анимация «База данных. Ежедневная актуализация» Техэксперт. Код для вставки в блок T123 или Zero Block HTML widget на Tilda -->
<div class="te-database-widget-container">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400&display=swap');

        .te-database-widget-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            background: #FFFFFF;
            border: 0.8px solid #E2E8F0;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            position: relative;
            font-family: 'Montserrat', sans-serif;
        }

        /* Адаптивное масштабирование SVG */
        .te-database-widget-container svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Текстовые стили - строго Montserrat 400 */
        .te-database-widget-container text {
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 400 !important;
        }

        /* Базовая расцветка цилиндров базы данных */
        .te-database-widget-container .db-cylinder-top,
        .te-database-widget-container .db-cylinder-mid,
        .te-database-widget-container .db-cylinder-bot {
            fill: #F1F5F9;
        }
        .te-database-widget-container .db-body-top,
        .te-database-widget-container .db-body-mid,
        .te-database-widget-container .db-body-bot {
            fill: #E2E8F0;
        }

        /* Анимация обновления базы данных (волна серого к оранжевому по цилиндрам) */
        .te-database-widget-container .db-cylinder-top { animation: te-db-update-wave 2.2s infinite ease-in-out; }
        .te-database-widget-container .db-cylinder-mid { animation: te-db-update-wave 2.2s infinite ease-in-out 0.4s; }
        .te-database-widget-container .db-cylinder-bot { animation: te-db-update-wave 2.2s infinite ease-in-out 0.8s; }

        .te-database-widget-container .db-body-top { animation: te-db-body-update 2.2s infinite ease-in-out; }
        .te-database-widget-container .db-body-mid { animation: te-db-body-update 2.2s infinite ease-in-out 0.4s; }
        .te-database-widget-container .db-body-bot { animation: te-db-body-update 2.2s infinite ease-in-out 0.8s; }

        @keyframes te-db-update-wave {
            0%, 100% { fill: #F1F5F9; }
            50% { fill: #FFEFE6; } /* Мягкий оранжевый оттенок верха цилиндра */
        }

        @keyframes te-db-body-update {
            0%, 100% { fill: #E2E8F0; }
            50% { fill: #FFD0B3; } /* Мягкий оранжевый оттенок боковины цилиндра */
        }

        /* Поток данных (движущийся пунктир) */
        .te-database-widget-container .db-data-stream {
            stroke-dashoffset: 12;
            animation: te-db-stream-flow 0.8s linear infinite;
        }

        @keyframes te-db-stream-flow {
            to { stroke-dashoffset: 0; }
        }

        /* Анимация круглого штампа */
        .te-database-widget-container .verification-stamp {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: 15px 15px; /* Локальный центр штампа */
        }

        /* Плавное движение линии шкалы времени */
        .te-database-widget-container .timeline-progress-line {
            transition: x2 0.5s ease-in-out;
        }

        /* Анимация пульсации активного дня */
        .te-database-widget-container .day-circle {
            transition: stroke 0.3s, fill 0.3s;
        }
        .te-database-widget-container .day-dot {
            transition: opacity 0.3s;
        }
        .te-database-widget-container .day-text {
            transition: fill 0.3s;
        }
    </style>

    <svg viewBox="0 0 340 380" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="background:#FFFFFF; display:block;">
        <defs>
            <filter id="te-db-doc-shadow" x="-15%" y="-20%" width="130%" height="130%">
                <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.04" />
            </filter>
            <clipPath id="te-db-url-clip">
                <rect x="68" y="8" width="244" height="26" />
            </clipPath>
        </defs>

        <!-- Шапка браузерного окна -->
        <rect x="0" y="0" width="340" height="42" fill="#F8FAFC" />
        <line x1="0" y1="42" x2="340" y2="42" stroke="#E2E8F0" stroke-width="0.8" />
        
        <!-- Кнопочки -->
        <circle cx="15" cy="21" r="4" fill="#E2E8F0" />
        <circle cx="27" cy="21" r="4" fill="#E2E8F0" />
        <circle cx="39" cy="21" r="4" fill="#E2E8F0" />
        
        <!-- Поле URL -->
        <rect x="58" y="8" width="264" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.8" />
        <text clip-path="url(#te-db-url-clip)" x="70" y="24" fill="#64748B" font-size="9" class="browser-url">https://techexpert.ru/db/daily_update</text>

        <!-- ================= БАЗА ДАННЫХ (утонченные цилиндры с анимацией волны обновлений) ================= -->
        <g class="db-group" transform="translate(45, 115)">
            <!-- Тень под базой -->
            <ellipse cx="20" cy="53" rx="18" ry="4" fill="#0F172A" opacity="0.04" />
            
            <!-- Нижний цилиндр -->
            <path d="M0,35 V48 A20,5 0 0,0 40,48 V35 Z" stroke="#94A3B8" stroke-width="0.8" class="db-body-bot" />
            <ellipse cx="20" cy="35" rx="20" ry="5" stroke="#94A3B8" stroke-width="0.8" class="db-cylinder-bot" />
            
            <!-- Средний цилиндр -->
            <path d="M0,18 V31 A20,5 0 0,0 40,31 V18 Z" stroke="#94A3B8" stroke-width="0.8" class="db-body-mid" />
            <ellipse cx="20" cy="18" rx="20" ry="5" stroke="#94A3B8" stroke-width="0.8" class="db-cylinder-mid" />
            
            <!-- Верхний цилиндр -->
            <path d="M0,1 V14 A20,5 0 0,0 40,14 V1 Z" stroke="#94A3B8" stroke-width="0.8" class="db-body-top" />
            <ellipse cx="20" cy="1" rx="20" ry="5" stroke="#94A3B8" stroke-width="0.8" class="db-cylinder-top" />
        </g>

        <!-- ================= СОЕДИНИТЕЛЬНАЯ ЛИНИЯ ПОТОКА ДАННЫХ ================= -->
        <path d="M90,145 C120,145 130,145 170,145" fill="none" stroke="#E2E8F0" stroke-width="1" />
        <path d="M90,145 C120,145 130,145 170,145" fill="none" stroke="#FF7200" stroke-width="1.2" stroke-dasharray="4 8" class="db-data-stream" />

        <!-- ================= ЦЕНТРАЛЬНЫЙ ЛИСТ ДОКУМЕНТА ================= -->
        <g class="doc-card-group" transform="translate(180, 75)">
            <!-- Тень и основа документа -->
            <rect x="0" y="0" width="115" height="155" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.8" filter="url(#te-db-doc-shadow)" />
            
            <!-- Загиб листа -->
            <path d="M97,0 L115,18 L97,18 Z" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.8" />
            <path d="M97,0 L97,18 L115,18" fill="none" stroke="#E2E8F0" stroke-width="0.8" />
            
            <!-- Название документа (ЧЕРНЫЙ шрифт) -->
            <text x="12" y="24" fill="#000000" font-size="9" class="doc-title">СП 12-136-2002</text>
            
            <!-- Текстовые строки (утонченные) -->
            <g class="doc-lines" fill="#E2E8F0">
                <rect x="12" y="36" width="70" height="1.5" rx="0.7" />
                <rect x="12" y="45" width="82" height="1.5" rx="0.7" />
                <rect x="12" y="54" width="60" height="1.5" rx="0.7" />
                <rect x="12" y="63" width="75" height="1.5" rx="0.7" />
                <rect x="12" y="72" width="40" height="1.5" rx="0.7" />
            </g>
            
            <!-- Разделительная линия (утонченная) -->
            <line x1="12" y1="84" x2="103" y2="84" stroke="#F1F5F9" stroke-width="0.8" />
            
            <!-- Статус верификации экспертами -->
            <text x="12" y="99" fill="#94A3B8" font-size="7" letter-spacing="0.3">СТАТУС ПРОВЕРКИ:</text>
            
            <!-- Плашка статуса -->
            <g class="status-badge" transform="translate(12, 108)">
                <rect width="91" height="14" rx="3" fill="#FFEFE6" class="status-bg" />
                <text x="45.5" y="10" fill="#FF7200" font-size="8" text-anchor="middle" class="status-text">СВЕРКА...</text>
            </g>
            
            <!-- Круглый штамп верификации (размещен в изолированном g-контейнере для сохранения позиционирования x=80, y=42) -->
            <g transform="translate(80, 42)">
                <g class="verification-stamp" transform="scale(0)">
                    <circle cx="15" cy="15" r="14" fill="none" stroke="#10B981" stroke-width="1" stroke-dasharray="2 1" />
                    <circle cx="15" cy="15" r="12.5" fill="#FFFFFF" stroke="#10B981" stroke-width="0.8" />
                    <path d="M10,15 L13,18 L20,11" fill="none" stroke="#10B981" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
                </g>
            </g>
        </g>

        <!-- ================= ЕЖЕДНЕВНАЯ ШКАЛА (ПН-ПТ) ================= -->
        <g class="timeline-group" transform="translate(30, 275)">
            <!-- Заголовок шкалы -->
            <text x="20" y="0" fill="#94A3B8" font-size="8" letter-spacing="0.5">ЕЖЕДНЕВНЫЙ МОНИТОРИНГ</text>
            
            <!-- Line-соединение дней -->
            <line x1="20" y1="20" x2="260" y2="20" stroke="#E2E8F0" stroke-width="0.8" stroke-linecap="round" />
            <line x1="20" y1="20" x2="20" y2="20" stroke="#FF7200" stroke-width="0.8" stroke-linecap="round" class="timeline-progress-line" />
            
            <!-- Дни недели -->
            <!-- Понедельник -->
            <g class="day-node" transform="translate(20, 20)">
                <circle cx="0" cy="0" r="4.5" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.8" class="day-circle" />
                <circle cx="0" cy="0" r="2" fill="#FF7200" opacity="0" class="day-dot" />
                <text x="0" y="18" fill="#94A3B8" font-size="8" text-anchor="middle" class="day-text">ПН</text>
            </g>
            <!-- Вторник -->
            <g class="day-node" transform="translate(80, 20)">
                <circle cx="0" cy="0" r="4.5" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.8" class="day-circle" />
                <circle cx="0" cy="0" r="2" fill="#FF7200" opacity="0" class="day-dot" />
                <text x="0" y="18" fill="#94A3B8" font-size="8" text-anchor="middle" class="day-text">ВТ</text>
            </g>
            <!-- Среда -->
            <g class="day-node" transform="translate(140, 20)">
                <circle cx="0" cy="0" r="4.5" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.8" class="day-circle" />
                <circle cx="0" cy="0" r="2" fill="#FF7200" opacity="0" class="day-dot" />
                <text x="0" y="18" fill="#94A3B8" font-size="8" text-anchor="middle" class="day-text">СР</text>
            </g>
            <!-- Четверг -->
            <g class="day-node" transform="translate(200, 20)">
                <circle cx="0" cy="0" r="4.5" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.8" class="day-circle" />
                <circle cx="0" cy="0" r="2" fill="#FF7200" opacity="0" class="day-dot" />
                <text x="0" y="18" fill="#94A3B8" font-size="8" text-anchor="middle" class="day-text">ЧТ</text>
            </g>
            <!-- Пятница -->
            <g class="day-node" transform="translate(260, 20)">
                <circle cx="0" cy="0" r="4.5" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.8" class="day-circle" />
                <circle cx="0" cy="0" r="2" fill="#FF7200" opacity="0" class="day-dot" />
                <text x="0" y="18" fill="#94A3B8" font-size="8" text-anchor="middle" class="day-text">ПТ</text>
            </g>
        </g>
    </svg>

    <!-- Логика переключения документов (изолированная) -->
    <script>
        (() => {
            const container = document.currentScript.parentElement;
            const browserUrlEl = container.querySelector('.browser-url');
            const docTitleEl = container.querySelector('.doc-title');
            const statusBgEl = container.querySelector('.status-bg');
            const statusTextEl = container.querySelector('.status-text');
            const stampEl = container.querySelector('.verification-stamp');
            const progressLineEl = container.querySelector('.timeline-progress-line');
            const dayNodes = container.querySelectorAll('.day-node');
            const docLines = container.querySelectorAll('.doc-lines rect');

            const docs = [
                { title: "СП 12-136-2002", url: "https://techexpert.ru/db/snip_12_03_2001", dayIndex: 0 },
                { title: "ГОСТ Р 58091", url: "https://techexpert.ru/db/gost_r_58091", dayIndex: 1 },
                { title: "Положение РТН", url: "https://techexpert.ru/db/prikaz_rtn_312", dayIndex: 2 },
                { title: "Схема AutoCAD", url: "https://techexpert.ru/db/autocad_ventilation", dayIndex: 3 },
                { title: "ГОСТ Р 58091", url: "https://techexpert.ru/db/gost_r_58091", dayIndex: 4 }
            ];

            let currentDocIndex = 0;

            function resetWidgetState() {
                // Скрываем штамп
                stampEl.style.transform = 'scale(0)';
                // Устанавливаем статус сверки
                statusBgEl.setAttribute('fill', '#FFEFE6');
                statusTextEl.setAttribute('fill', '#FF7200');
                statusTextEl.textContent = 'СВЕРКА...';
                // Сбрасываем подсветку строк
                docLines.forEach(line => line.setAttribute('fill', '#E2E8F0'));
            }

            function runUpdateCycle() {
                const doc = docs[currentDocIndex];
                
                // Шаг 1: Начало проверки
                browserUrlEl.textContent = "https://techexpert.ru/db/compare_versions?doc=" + doc.title.replace(/\s/g, '_');
                docTitleEl.textContent = doc.title;
                resetWidgetState();

                // Обновляем прогресс-линию и точки на временной шкале
                const progressX = 20 + doc.dayIndex * 60;
                progressLineEl.setAttribute('x2', progressX);

                dayNodes.forEach((node, idx) => {
                    const circle = node.querySelector('.day-circle');
                    const dot = node.querySelector('.day-dot');
                    const text = node.querySelector('.day-text');

                    if (idx < doc.dayIndex) {
                        // Прошедшие дни: отмечены пройденными
                        circle.setAttribute('stroke', '#FF7200');
                        circle.setAttribute('fill', '#FFF7ED');
                        dot.style.opacity = '0.4';
                        text.setAttribute('fill', '#FF7200');
                    } else if (idx === doc.dayIndex) {
                        // Текущий день: активный
                        circle.setAttribute('stroke', '#FF7200');
                        circle.setAttribute('fill', '#FFFFFF');
                        dot.style.opacity = '1';
                        text.setAttribute('fill', '#1E293B');
                    } else {
                        // Будущие дни: неактивны
                        circle.setAttribute('stroke', '#E2E8F0');
                        circle.setAttribute('fill', '#FFFFFF');
                        dot.style.opacity = '0';
                        text.setAttribute('fill', '#94A3B8');
                    }
                });

                // Шаг 2: Завершение сверки (700 мс)
                setTimeout(() => {
                    if (!document.body.contains(container)) return;

                    // Устанавливаем итоговый URL
                    browserUrlEl.textContent = doc.url;
                    
                    // Подсвечиваем обновленные строки на листе
                    if (docLines[1]) docLines[1].setAttribute('fill', '#FF7200');
                    if (docLines[3]) docLines[3].setAttribute('fill', '#FF7200');

                    // Меняем статус на АКТУАЛЬНО
                    statusBgEl.setAttribute('fill', '#ECFDF5');
                    statusTextEl.setAttribute('fill', '#10B981');
                    statusTextEl.textContent = 'АКТУАЛЬНО';

                    // Ставим штамп верификации
                    stampEl.style.transform = 'scale(1)';
                }, 700);

                // Переход к следующему документу
                currentDocIndex = (currentDocIndex + 1) % docs.length;
            }

            // Запуск первого цикла
            runUpdateCycle();

            // Циклическое обновление (2200 мс)
            const intervalId = setInterval(() => {
                if (!document.body.contains(container)) {
                    clearInterval(intervalId);
                    return;
                }
                runUpdateCycle();
            }, 2200);
        })();
    </script>
</div>
