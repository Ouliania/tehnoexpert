    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #F8FAFC;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .widget-container {
            width: 100%;
            max-width: 340px; /* окно анимации */
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
            overflow: hidden;
        }

        /* Ускоренная пофрагментная анимация (эффект плавно бегущей линии/волны) */
        .doc-row rect {
            fill: #E2E8F0;
            transition: fill 0.2s ease-in-out;
        }

        .row-1 rect { animation: smooth-wave 3s infinite; animation-delay: 0s; }
        .row-2 rect { animation: smooth-wave 3s infinite; animation-delay: 0.27s; }
        .row-3 rect { animation: smooth-wave 3s infinite; animation-delay: 0.54s; }
        .row-4 rect { animation: smooth-wave 3s infinite; animation-delay: 0.81s; }
        .row-5 rect { animation: smooth-wave 3s infinite; animation-delay: 1.08s; }
        .row-6 rect { animation: smooth-wave 3s infinite; animation-delay: 1.35s; }
        .row-7 rect { animation: smooth-wave 3s infinite; animation-delay: 1.62s; }
        .row-8 rect { animation: smooth-wave 3s infinite; animation-delay: 1.89s; }
        .row-9 rect { animation: smooth-wave 3s infinite; animation-delay: 2.16s; }
        .row-10 rect { animation: smooth-wave 3s infinite; animation-delay: 2.43s; }
        .row-11 rect { animation: smooth-wave 3s infinite; animation-delay: 2.7s; }

        @keyframes smooth-wave {
            0%, 100% { fill: #E2E8F0; }
            15% { fill: #FF7200; }
            30% { fill: #E2E8F0; }
        }

        /* Ускоренная анимация мерцания символов (0.45s) */
        .symbol-state-1 { animation: blink-cycle-1 0.45s infinite steps(1); }
        .symbol-state-2 { animation: blink-cycle-2 0.45s infinite steps(1); }
        .symbol-state-3 { animation: blink-cycle-3 0.45s infinite steps(1); }

        @keyframes blink-cycle-1 {
            0%, 33.3% { opacity: 1; }
            33.4%, 100% { opacity: 0; }
        }

        @keyframes blink-cycle-2 {
            0%, 33.3% { opacity: 0; }
            33.4%, 66.6% { opacity: 1; }
            66.7%, 100% { opacity: 0; }
        }

        @keyframes blink-cycle-3 {
            0%, 66.6% { opacity: 0; }
            66.7%, 100% { opacity: 1; }
        }

        /* Движение символов вверх (быстрее, бесшовный сдвиг на 2 строки по 12px) */
        .scrolling-symbols {
            animation: scroll-up 1.4s linear infinite;
        }

        @keyframes scroll-up {
            from { transform: translateY(0); }
            to { transform: translateY(-24px); }
        }
    </style>

    <!-- Логика переключения документов -->
    <script>
        const browserUrlEl = document.getElementById('browser-url');
        const fileTagEl = document.getElementById('file-tag');

        const docs = [
            { url: "https://techexpert.ru/db/snip_12_03_2001", name: "СП 12-136-2002", format: "СП" },
            { url: "https://techexpert.ru/db/prikaz_rtn_312", name: "Положение Ростехнадзора", format: "Положение" },
            { url: "https://techexpert.ru/db/autocad_ventilation_scheme", name: "Схема вентиляции", format: "AutoCAD" },
            { url: "https://techexpert.ru/db/gost_r_58091", name: "ГОСТ Р 58091-2018", format: "ГОСТ" }
        ];

        let index = 0;

        function adjustTagSize(format) {
            fileTagEl.textContent = format;
            
            // Динамический расчет ширины текста
            const textWidth = fileTagEl.getComputedTextLength() || 24;
            const padding = 16; // отступы по 8px с каждого бока
            const tagWidth = textWidth + padding;
            
            const tagRect = document.getElementById('tag-rect');
            tagRect.setAttribute('width', tagWidth);
            
            // Выравниваем ЦЕНТР плашки по правому краю масштабированного документа (x=224, y=225)
            const tagGroup = document.getElementById('tag-group');
            const newX = 224 - (tagWidth / 2);
            tagGroup.setAttribute('transform', `translate(${newX}, 225)`);
            
            // Центрируем текст внутри новой ширины плашки
            fileTagEl.setAttribute('x', tagWidth / 2);
        }

        function updateWidgetInfo() {
            index = (index + 1) % docs.length;
            const currentDoc = docs[index];
            
            browserUrlEl.textContent = currentDoc.url;
            adjustTagSize(currentDoc.format);
        }

        // Первичная подстройка размера под стартовый документ
        adjustTagSize(docs[0].format);

        setInterval(updateWidgetInfo, 3000);
    </script>
