<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон бегущих символов</title>
    <!--
    ИНСТРУКЦИЯ ПО ИНТЕГРАЦИИ В TILDA:
    1. Создайте блок T123 (HTML/код).
    2. Скопируйте содержимое этого файла (CSS, HTML и скрипт).
    3. Вы можете настроить цвет, размер и скорость через CSS-переменные в :root.
    -->
    <style>
        :root {
            /* === НАСТРОЙКИ ДИЗАЙНА ФОНА === */
            --bg-color: #FBFBFB;                /* Цвет фона страницы */
            --symbols-color: #FF7200;           /* Цвет символов (фирменный оранжевый) */
            --symbols-opacity: 0.18;            /* Прозрачность символов */
            --symbols-font-size: 10px;          /* Размер символов (1.3x) */
            --symbols-line-height: 15px;        /* Высота строки (1.3x) */
            --symbols-letter-spacing: 2.6px;    /* Расстояние между символами (1.3x) */
            --symbols-speed: 9.6s;              /* Скорость прокрутки вверх (скорректирована под 12 строк) */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-color);        /* Цвет фона страницы */
        }

        .bg-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: var(--bg-color);
        }

        /* 
          Откат к первоначальной HTML-структуре рендеринга на DIV-элементах.
          Это убирает любые баги WebKit с масштабированием SVG-текста по ширине.
        */
        .scrolling-symbols {
            position: relative;
            width: 100%;
            height: 100%;
            font-family: monospace;
            font-size: var(--symbols-font-size);
            letter-spacing: var(--symbols-letter-spacing);
            color: var(--symbols-color);
            opacity: var(--symbols-opacity);
            animation: scroll-up var(--symbols-speed) linear infinite;
        }

        /* Элемент строки символов */
        .symbol-row {
            height: var(--symbols-line-height);
            line-height: var(--symbols-line-height);
            white-space: pre; /* Важно! Предотвращает схлопывание пустых пробелов в HTML */
            overflow: hidden;
        }

        /* Анимация движения вверх (бесшовный сдвиг на высоту 12 строк для разрушения вертикальных полос) */
        @keyframes scroll-up {
            from { transform: translateY(0); }
            to { transform: translateY(calc(-12 * var(--symbols-line-height))); }
        }

        /* Пофрагментное мерцание (эффект матрицы из 3 кадров) */
        .state-1, .state-2, .state-3 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }

        .state-1 { animation: blink-cycle-1 0.45s infinite steps(1); }
        .state-2 { animation: blink-cycle-2 0.45s infinite steps(1); }
        .state-3 { animation: blink-cycle-3 0.45s infinite steps(1); }

        @keyframes blink-cycle-1 {
            0%, 33.3% { opacity: 1; }
            33.4%, 100% { opacity: 0; }
        }

        @keyframes blink-cycle-2 {
            0%, 33.3% { opacity: 0; }
            33.4%, 66.6% { opacity: 1; }
            66.7%, 100% { opacity: 0; }
        }

        @keyframes blink-cycle-3 {
            0%, 66.6% { opacity: 0; }
            66.7%, 100% { opacity: 1; }
        }

        /* 
          Абсолютно стабильный CSS-градиент затухания.
          Он лежит поверх всего контента и делает плавное исчезновение символов у краев.
          Это 100% кроссбраузерно и решает баги WebKit с искажением ширины маски-картинки.
        */
        .fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(to bottom, 
                var(--bg-color) 0%, 
                transparent 35%, 
                transparent 75%, 
                var(--bg-color) 100%
            );
            z-index: 2;
        }

        /* SVG оверлей для V-образного среза поверх символов */
        #v-overlay-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: block;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="bg-container" id="bg-container">
        <!-- Блок бегущих символов на базе простых HTML-div -->
        <div class="scrolling-symbols">
            <!-- Кадр 1 -->
            <div class="state-1" id="state-1"></div>
            <!-- Кадр 2 -->
            <div class="state-2" id="state-2"></div>
            <!-- Кадр 3 -->
            <div class="state-3" id="state-3"></div>
        </div>

        <!-- 
          Маскирующий векторный оверлей цвета фона (#FBFBFB), лежащий поверх символов.
          Он физически закрывает верхнюю часть экрана по V-образной траектории,
          создавая срез символов без использования clip-path на самом контейнере.
        -->
        <svg id="v-overlay-svg" xmlns="http://www.w3.org/2000/svg">
            <path id="v-overlay-path" fill="var(--bg-color)" />
        </svg>

        <!-- CSS-градиентная маска для плавного растворения сверху и снизу -->
        <div class="fade-overlay"></div>
    </div>

    <script>
        const container = document.getElementById('bg-container');
        const state1El = document.getElementById('state-1');
        const state2El = document.getElementById('state-2');
        const state3El = document.getElementById('state-3');
        const overlayPath = document.getElementById('v-overlay-path');

        // Функция генерации случайной строки с органичными проплешинами
        function generateRandomLine(length) {
            // Набор символов с преобладанием точек и тире для легкости текстуры
            const symbols = ['.', '.', ':', ':', '-', '-', '=', '=', '+', 'X', '•'];
            let result = '';
            
            while (result.length < length) {
                // Случайная длина кластера символов (от 4 до 12 символов)
                const clusterLength = Math.floor(Math.random() * 9) + 4;
                for (let i = 0; i < clusterLength; i++) {
                    result += symbols[Math.floor(Math.random() * symbols.length)];
                }
                if (result.length >= length) break;

                // Случайный пропуск (от 3 до 9 пробелов) - проплешины теперь меньше и рандомны
                const spaceLength = Math.floor(Math.random() * 7) + 3;
                result += ' '.repeat(spaceLength);
            }
            return result.substring(0, length);
        }

        function generateRows() {
            // Измеряем точные физические размеры контейнера на экране
            const rect = container.getBoundingClientRect();
            const width = rect.width || container.offsetWidth || window.innerWidth;
            const height = rect.height || container.offsetHeight || window.innerHeight;
            
            // Считываем параметры шрифта из CSS-переменных
            const style = getComputedStyle(document.documentElement);
            const fontSize = parseFloat(style.getPropertyValue('--symbols-font-size')) || 10;
            const letterSpacing = parseFloat(style.getPropertyValue('--symbols-letter-spacing')) || 2.6;
            const lineHeight = parseInt(style.getPropertyValue('--symbols-line-height')) || 15;
            
            // 1. ПЕРЕСЧЕТ V-ОБРАЗНОЙ МАСКИРУЮЩЕЙ ПЛАШКИ В ПИКСЕЛЯХ
            const yTop = height * 0.35;
            const yBottom = height * 0.65;
            const xLeftFlat = width * 0.40;
            const xRightFlat = width * 0.60;
            
            const cp1x = width * 0.82;
            const cp1y = height * 0.45;
            const cp2x = width * 0.70;
            const cp2y = yBottom;
            
            const cp3x = width * 0.30;
            const cp3y = yBottom;
            const cp4x = width * 0.18;
            const cp4y = height * 0.45;

            // Контур закрывает верхнюю часть экрана (от Y=0 до кривой выреза)
            const pathD = `M 0,0 L ${width},0 L ${width},${yTop} C ${cp1x},${cp1y} ${cp2x},${cp2y} ${xRightFlat},${yBottom} L ${xLeftFlat},${yBottom} C ${cp3x},${cp3y} ${cp4x},${cp4y} 0,${yTop} Z`;
            overlayPath.setAttribute('d', pathD);
            
            // 2. Генерация строк текста под новую ширину
            const charWidth = fontSize + letterSpacing;
            const charsNeeded = Math.max(350, Math.ceil(width / charWidth) + 15);
            // Добавляем 12 строк запаса снизу для бесшовного сдвига вверх
            const rowsCount = Math.ceil(height / lineHeight) + 12;

            // Функция наполнения кадра HTML-строками
            function fillState(element) {
                element.innerHTML = '';
                
                // Генерируем 12 уникальных случайных строк для разрушения вертикальных полос
                const rowTexts = [];
                for (let j = 0; j < 12; j++) {
                    rowTexts.push(generateRandomLine(charsNeeded));
                }
                
                for (let i = 0; i < rowsCount; i++) {
                    const row = document.createElement('div');
                    row.className = 'symbol-row';
                    // Зацикливаем 12 паттернов по кругу (каждая 12-я строка идентична)
                    row.textContent = rowTexts[i % 12];
                    element.appendChild(row);
                }
            }

            fillState(state1El);
            fillState(state2El);
            fillState(state3El);
        }

        // ResizeObserver для точного отслеживания физических размеров
        const resizeObserver = new ResizeObserver(() => {
            generateRows();
        });
        resizeObserver.observe(container);
    </script>
</body>
</html>
