<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анимация умного поиска Техэксперт v2</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #F8FAFC;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .widget-container {
            position: relative;
            width: 100%;
            max-width: 650px;
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
            overflow: hidden;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .widget-container svg {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <canvas id="bg-canvas"></canvas>
        <svg viewBox="0 0 650 420" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="display:block;">
            <defs>
                <filter id="doc-shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.05" />
                </filter>

                <!-- Мягкий градиент для сканирующего луча -->
                <linearGradient id="scanGradient" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stop-color="#FF7200" stop-opacity="0.0" />
                    <stop offset="30%"  stop-color="#FF7200" stop-opacity="0.15" />
                    <stop offset="45%"  stop-color="#FF7200" stop-opacity="1.0" />
                    <stop offset="55%"  stop-color="#FF7200" stop-opacity="1.0" />
                    <stop offset="70%"  stop-color="#FF7200" stop-opacity="0.15" />
                    <stop offset="100%" stop-color="#FF7200" stop-opacity="0.0" />
                </linearGradient>

                <!-- Скользящий луч -->
                <rect id="scanBeam" x="-5" y="-25" width="150" height="25" fill="url(#scanGradient)">
                    <animate attributeName="y" values="-25;195" dur="2.6s" repeatCount="indefinite" />
                </rect>

                <!-- Маска, скрывающая оранжевые строки — видно только под лучом -->
                <mask id="scanMask">
                    <rect x="0" y="0" width="150" height="200" fill="#000" />
                    <use href="#scanBeam" fill="#fff" />
                </mask>
            </defs>

            <!-- Шапка браузерного окна -->
            <rect x="0" y="0" width="650" height="42" fill="#F8FAFC" />
            <line x1="0" y1="42" x2="650" y2="42" stroke="#E2E8F0" stroke-width="1" />

            <circle cx="20" cy="21" r="5" fill="#E2E8F0" />
            <circle cx="34" cy="21" r="5" fill="#E2E8F0" />
            <circle cx="48" cy="21" r="5" fill="#E2E8F0" />

            <!-- URL-бар -->
            <rect x="110" y="8" width="430" height="26" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
            <text x="126" y="25" fill="#64748B" font-family="monospace" font-size="11" id="browser-url">https://example.com/docs/manual.html</text>

            <line x1="170" y1="42" x2="170" y2="420" stroke="#F1F5F9" stroke-width="1" />
            <line x1="480" y1="42" x2="480" y2="420" stroke="#F1F5F9" stroke-width="1" />

            <!-- Левая панель (соседний документ) -->
            <rect x="-80" y="140" width="160" height="200" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" opacity="0.3" />
            <path d="M60 140 L80 160 L60 160 Z" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" opacity="0.3" />
            <path d="M60 140 L60 160 L80 160" fill="none" stroke="#E2E8F0" stroke-width="1" opacity="0.3" />

            <!-- Правая панель -->
            <rect x="570" y="140" width="160" height="200" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" opacity="0.3" />

            <!-- ================= ЦЕНТРАЛЬНЫЙ ЛИСТ ДОКУМЕНТА ================= -->
            <g transform="translate(255, 95)" filter="url(#doc-shadow)">
                <!-- Белая бумага -->
                <rect x="0" y="0" width="140" height="185" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2" />

                <!-- Загнутый правый верхний уголок -->
                <path d="M120 0 L140 20 L120 20 Z" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.2" />
                <path d="M120 0 L120 20 L140 20" fill="none" stroke="#E2E8F0" stroke-width="1.2" />

                <!-- Серые строки (всегда видны) -->
                <g fill="#E2E8F0">
                    <rect x="15" y="25"  width="45" height="4" rx="2" />
                    <rect x="65" y="25"  width="20" height="4" rx="2" />
                    <rect x="15" y="45"  width="35" height="4" rx="2" />
                    <rect x="55" y="45"  width="50" height="4" rx="2" />
                    <rect x="110" y="45" width="15" height="4" rx="2" />
                    <rect x="15" y="65"  width="70" height="4" rx="2" />
                    <rect x="90" y="65"  width="35" height="4" rx="2" />
                    <rect x="15" y="85"  width="40" height="4" rx="2" />
                    <rect x="60" y="85"  width="45" height="4" rx="2" />
                    <rect x="15" y="105"  width="50" height="4" rx="2" />
                    <rect x="70" y="105" width="25" height="4" rx="2" />
                    <rect x="100" y="105" width="25" height="4" rx="2" />
                    <rect x="15" y="125" width="35" height="4" rx="2" />
                    <rect x="55" y="125" width="60" height="4" rx="2" />
                    <rect x="15" y="145" width="65" height="4" rx="2" />
                    <rect x="85" y="145" width="40" height="4" rx="2" />
                    <rect x="15" y="165" width="45" height="4" rx="2" />
                    <rect x="65" y="165" width="30" height="4" rx="2" />
                </g>

                <!-- Оранжевые строки (видны только через маску сканирующего луча) -->
                <g fill="#FF7200" mask="url(#scanMask)">
                    <rect x="15" y="25"  width="45" height="4" rx="2" />
                    <rect x="65" y="25"  width="20" height="4" rx="2" />
                    <rect x="15" y="45"  width="35" height="4" rx="2" />
                    <rect x="55" y="45"  width="50" height="4" rx="2" />
                    <rect x="110" y="45" width="15" height="4" rx="2" />
                    <rect x="15" y="65"  width="70" height="4" rx="2" />
                    <rect x="90" y="65"  width="35" height="4" rx="2" />
                    <rect x="15" y="85"  width="40" height="4" rx="2" />
                    <rect x="60" y="85"  width="45" height="4" rx="2" />
                    <rect x="15" y="105"  width="50" height="4" rx="2" />
                    <rect x="70" y="105" width="25" height="4" rx="2" />
                    <rect x="100" y="105" width="25" height="4" rx="2" />
                    <rect x="15" y="125" width="35" height="4" rx="2" />
                    <rect x="55" y="125" width="60" height="4" rx="2" />
                    <rect x="15" y="145" width="65" height="4" rx="2" />
                    <rect x="85" y="145" width="40" height="4" rx="2" />
                    <rect x="15" y="165" width="45" height="4" rx="2" />
                    <rect x="65" y="165" width="30" height="4" rx="2" />
                </g>
            </g>

            <!-- Ярлычок формата -->
            <g transform="translate(365, 245)">
                <rect width="60" height="24" rx="6" fill="#94A3B8" />
                <text x="30" y="16" fill="#FFFFFF" font-family="-apple-system, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" id="file-tag">HTML</text>
            </g>

            <!-- ================= КНОПКА "Поиск по базе" ================= -->
            <g transform="translate(325, 325)">
                <rect x="-70" y="0" width="140" height="34" rx="17" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2" />
                <circle cx="-46" cy="17" r="3.5" fill="#FF7200">
                    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" />
                </circle>
                <text x="12" y="22" fill="#1E293B" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Поиск по базе</text>
            </g>
        </svg>
    </div>

    <script>
        // ================= CANVAS: Бегущие фоновые символы =================
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let dpr = window.devicePixelRatio || 1;
        const W = 650;
        const H = 420;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.scale(dpr, dpr);

        const CHARS = '+-=:.*X#@0123456789abcdef'; // не слишком визуально тяжелые
        const FONT_SIZE = 10;
        const LINE_HEIGHT = 17;
        const AREA = { x: 175, y: 50, w: 300, h: 368 };

        function rndChar() { return CHARS[Math.floor(Math.random() * CHARS.length)]; }

        // Генерируем множество независимых символов (не цепочками, а роем)
        const particles = [];
        const particleCount = 80;

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: AREA.x + Math.random() * AREA.w,
                y: AREA.y + Math.random() * AREA.h,
                char: rndChar(),
                speed: 0.3 + Math.random() * 1.8,
                opacity: 0.2 + Math.random() * 0.5,
                phase: Math.random() * Math.PI * 2, // для дрожания/смены символа
            });
        }

        let lastTime = performance.now();

        function animate(now) {
            const dt = Math.min((now - lastTime) / 16.667, 3);
            lastTime = now;

            ctx.clearRect(0, 0, 650, 420);
            ctx.font = FONT_SIZE + 'px monospace';
            ctx.textBaseline = 'middle';

            for (const p of particles) {
                p.y += p.speed * dt;
                if (p.y > AREA.y + AREA.h + 15) {
                    p.y = AREA.y - 15;
                    p.x = AREA.x + Math.random() * AREA.w;
                    p.char = rndChar();
                }

                // Меняем символ время от времени (на основе синуса фазы)
                p.phase += 0.03 * dt;
                if (Math.sin(p.phase) > 0.92) {
                    p.char = rndChar();
                }

                if (p.y > AREA.y - 5 && p.y < AREA.y + AREA.h + 5) {
                    ctx.fillStyle = `rgba(255, 114, 0, ${p.opacity})`;
                    ctx.fillText(p.char, p.x, p.y);
                }
            }

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);

        // ================= Документ: циклическая смена формата =================
        const urlEl = document.getElementById('browser-url');
        const tagEl = document.getElementById('file-tag');

        const docs = [
            { url: 'https://example.com/docs/manual.html',    format: 'HTML' },
            { url: 'https://example.com/files/notes.docx',     format: 'DOCX' },
            { url: 'https://example.com/docs/gost_r_58091.pdf', format: 'PDF' },
        ];

        let idx = 0;

        setInterval(() => {
            idx = (idx + 1) % docs.length;
            urlEl.textContent = docs[idx].url;
            tagEl.textContent = docs[idx].format;
        }, 6000);
    </script>
</body>
</html>
