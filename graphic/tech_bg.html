<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firecrawl Hero Background</title>
<style>
:root {
  --border-faint: #E2E8F0;
  --heat-100: #FF7200;
  --black-alpha-12: rgba(15, 23, 42, 0.12);
  --bg: #FBFBFB;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); min-height: 100vh; display: flex; justify-content: center; overflow-x: hidden; }
.hero { position: relative; width: 1335px; height: 606px; flex-shrink: 0; }
#c { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); width: 1314px; height: 506px; z-index: 1; pointer-events: none; }
</style>
</head>
<body>
<div class="hero" id="hero">
  <canvas id="c"></canvas>
  <div id="g" style="position:absolute;inset:0;pointer-events:none;z-index:2"></div>
</div>
<script>
(() => {
const NS = 'http://www.w3.org/2000/svg';
const HERO_W = 1335, GRID_W = 1314, G = (HERO_W - GRID_W) / 2, CANVAS_W = 1314, CANVAS_H = 506;

// ===== CANVAS: 16 floating rounded rectangles =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpr = 2;
canvas.width = CANVAS_W * dpr; canvas.height = CANVAS_H * dpr;
canvas.style.width = CANVAS_W + 'px'; canvas.style.height = CANVAS_H + 'px';
ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

const rects = [];
const COUNT = 16;
for (let i = 0; i < COUNT; i++) {
  rects.push({
    x: Math.random() * (CANVAS_W - 80),
    y: Math.random() * (CANVAS_H - 30),
    w: 60 + Math.random() * 80,
    h: 12 + Math.random() * 24,
    vx: (Math.random() - 0.5) * 0.6,
    vy: (Math.random() - 0.5) * 0.6,
    alpha: 0.08 + Math.random() * 0.14,
    r: 4 + Math.random() * 6,
    da: (Math.random() - 0.5) * 0.002,
  });
}

let paused = false;
(function loop() {
  if (!paused) {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#FA5D19';
    for (const r of rects) {
      r.x += r.vx;
      r.y += r.vy;
      r.alpha += r.da;
      if (r.alpha <= 0.04 || r.alpha >= 0.22) r.da *= -1;
      if (r.x < -r.w) r.x = CANVAS_W;
      if (r.x > CANVAS_W) r.x = -r.w;
      if (r.y < -r.h) r.y = CANVAS_H;
      if (r.y > CANVAS_H) r.y = -r.h;

      ctx.globalAlpha = Math.max(0, r.alpha);
      ctx.beginPath();
      ctx.roundRect(r.x, r.y, r.w, r.h, r.r);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  requestAnimationFrame(loop);
})();

// ===== GRID =====
const grid = document.getElementById('g');

function E(tag, attrs, parent) {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) { if (k === 'text') el.textContent = v; else if (k === 'style') { for (const [sk, sv] of Object.entries(v)) el.style[sk] = sv; } else el.setAttribute(k, v); }
  if (parent) parent.appendChild(el);
  return el;
}
function D(style, parent) {
  const d = document.createElement('div');
  for (const [k, v] of Object.entries(style)) d.style[k] = v;
  if (parent) parent.appendChild(d);
  return d;
}
function curvy(x, y, w, h, corners) {
  const wrap = D({position:'absolute',left:x+'px',top:y+'px',width:w+'px',height:h+'px',pointerEvents:'none'}, grid);
  const path = 'M11 1L11 11L10 11L10 7C10 3.68629 7.31371 1 4 1L-4.37114e-08 1L0-4.80825e-07L11 4.37114e-07L11 1Z';
  const rots = {tl:'rotate(-90)',tr:'',bl:'rotate(180)',br:'rotate(90)'};
  const pos = {tl:{top:'0',left:'0'},tr:{top:'0',right:'0'},bl:{bottom:'0',left:'0'},br:{bottom:'0',right:'0'}};
  corners.forEach(cn => {
    const svg = E('svg',{width:'11',height:'11',viewBox:'0 0 11 11',fill:'none',transform:rots[cn],style:Object.assign({position:'absolute'},pos[cn])});
    E('path',{d:path,fill:'var(--border-faint)'},svg);
    wrap.appendChild(svg);
  });
}
function hSeg(top, left, width) { D({position:'absolute',top:top+'px',left:left+'px',width:width+'px',height:'1px',background:'var(--border-faint)'}, grid); }
function hSegR(top, right, width) { D({position:'absolute',top:top+'px',right:right+'px',width:width+'px',height:'1px',background:'var(--border-faint)'}, grid); }

// Overlay border-y + border-x
D({position:'absolute',top:'100px',left:G+'px',width:GRID_W+'px',height:'calc(100% - 199px)',borderTop:'1px solid var(--border-faint)',borderBottom:'1px solid var(--border-faint)',borderLeft:'1px solid var(--border-faint)',borderRight:'1px solid var(--border-faint)'}, grid);

// Vertical containers
[1314,910,708,506,304,102].forEach(w => {
  D({position:'absolute',top:'100px',left:(G+(GRID_W-w)/2)+'px',width:w+'px',height:(w<=506?'102px':'calc(100% - 99px)'),borderLeft:'1px solid var(--border-faint)',borderRight:'1px solid var(--border-faint)'}, grid);
});

// Horizontal full
D({position:'absolute',top:'201px',left:'0',width:'100%',height:'1px',background:'var(--border-faint)'}, grid);

// Segments
hSeg(302,G,303); hSeg(403,G,303); hSeg(504,G+100,203);
hSegR(302,G,303); hSegR(403,G,303); hSegR(504,G+100,203);

// Curvy outer
curvy(G-101,100,101,506,['br']);
curvy(G+GRID_W,100,101,506,['bl']);

// Curvy corners 1314
curvy(G-1,100,102,203,['tl','tr','bl','br']);
curvy(G+GRID_W-101,100,102,203,['tl','tr','bl','br']);

// 910 & 708 bottom
const l910=G+(GRID_W-910)/2, l708=G+(GRID_W-708)/2;
curvy(l910,100,910,506,['bl','br']);
curvy(l708,100,708,506,['bl','br']);

// Stop intersections
[100,201,302,403,504].forEach(y => {
  curvy(G-1,y,102,102,['tl','tr','bl','br']);
  curvy(G+GRID_W-101,y,102,102,['tl','tr','bl','br']);
});
[302,403,504].forEach(y => {
  curvy(G+101,y,102,102,['tl','tr','bl','br']);
  curvy(G+GRID_W-203,y,102,102,['tl','tr','bl','br']);
});
[100,201].forEach(y => {
  curvy(G+101,y,102,102,['tl','bl']);
  curvy(G+GRID_W-203,y,102,102,['tr','br']);
});

// 202 offset
curvy(G+202,100,102,102,['tl','tr','br']);
curvy(G+GRID_W-304,100,102,102,['tl','tr','bl']);

// 303..707
[303,404,505,606,707].forEach(x => {
  curvy(G+x,100,102,102,['tl','tr','bl','br']);
  curvy(G+GRID_W-x-102,100,102,102,['tl','tr','bl','br']);
});

// Cross badges на пересечениях (708 container)
const crossPath = 'M24 18C24 21.3137 26.6863 24 30 24H34V25H30C26.6863 25 24 27.6863 24 31V35H23V31C23 27.6863 20.3137 25 17 25H13V24H17C20.3137 24 23 21.3137 23 18V14H24V18Z';
function badge(x, y) {
  const wrap = D({position:'absolute',left:x+'px',top:y+'px',width:'47px',height:'47px',zIndex:'1'}, grid);
  const svg = E('svg',{width:'47',height:'47',viewBox:'0 0 47 47',fill:'none'});
  E('path',{d:crossPath,fill:'var(--heat-100)','fill-opacity':'1'},svg);
  E('circle',{cx:'23.5',cy:'23.5',r:'23',stroke:'#EDEDED','stroke-opacity':'1'},svg);
  wrap.appendChild(svg);
}
badge(l708-24, 77);
badge(l708+708-23, 77);
badge(l708+708-23, 100+506-124);



// Responsive
function resize() {
  const hero = document.getElementById('hero');
  const cw = hero.clientWidth, s = Math.min(cw / HERO_W, 1);
  grid.style.transform = `scale(${s})`; grid.style.transformOrigin = 'top center';
  grid.style.width = HERO_W + 'px'; grid.style.position = 'absolute'; grid.style.left = '50%'; grid.style.marginLeft = (-HERO_W/2) + 'px'; grid.style.top = '0';
  canvas.style.transform = `translateX(-50%) scale(${s})`;
  hero.style.height = (606 * s) + 'px';
  hero.style.width = (HERO_W * s) + 'px';
}
window.addEventListener('resize', resize);
resize();

})();
</script>
</body>
</html>
